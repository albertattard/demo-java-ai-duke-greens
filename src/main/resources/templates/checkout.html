<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Checkout | Duke Greens</title>
    <link rel="stylesheet" th:href="@{/css/application.css}">
</head>
<body>
<main>
    <section aria-labelledby="checkout-heading" class="welcome-panel">
        <p class="eyebrow">Basket review</p>
        <h1 id="checkout-heading">Checkout</h1>
        <p>Review your basket before completing a simulated order. No charge will be made.</p>
        <section aria-labelledby="checkout-basket-heading" class="basket">
            <h2 id="checkout-basket-heading">Your basket</h2>
            <table class="basket-lines">
                <thead>
                    <tr><th scope="col">Product</th><th scope="col">Quantity</th><th scope="col">Total</th></tr>
                </thead>
                <tbody>
                    <tr data-testid="checkout-basket-line" th:each="line : ${basketLines}">
                        <th scope="row" th:text="${line.name}">Product</th>
                        <td th:text="${line.quantity + ' pack' + (line.quantity == 1 ? '' : 's')}">1 pack</td>
                        <td th:text="${line.formattedLineTotal}">0,00 €</td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr><td colspan="2"></td><td th:text="${basketTotal}">0,00 €</td></tr>
                </tfoot>
            </table>
        </section>
        <div class="checkout-actions">
            <form method="get" th:action="@{/demo/basket/{conversationId}(conversationId=${conversationId})}">
                <button class="secondary-action" type="submit">Back to basket</button>
            </form>
            <form method="post" th:action="@{/demo/checkout/complete}" th:if="${basketFulfilsSelectedMeals}">
                <button type="submit">Complete simulated order</button>
            </form>
        </div>
    </section>
</main>
</body>
</html>
