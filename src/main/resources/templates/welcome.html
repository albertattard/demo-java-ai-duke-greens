<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Duke Greens</title>
    <link rel="stylesheet" th:href="@{/css/application.css}">
</head>
<body>
<main>
    <section aria-labelledby="welcome-heading" class="welcome-panel">
        <p class="eyebrow">Conversational green supermarket</p>
        <h1 id="welcome-heading">Duke Greens</h1>
        <p>Tell us what you would like to cook, and we will help plan your meals and groceries.</p>
        <section aria-live="polite" class="information-message" role="status" th:if="${informationMessage}">
            <h2>Meal request unavailable</h2>
            <p th:text="${informationMessage}"></p>
        </section>
        <form method="post" th:action="@{/meal-request}">
            <label for="meal-request">Describe the meals you want</label>
            <textarea id="meal-request" maxlength="300" name="mealRequest" placeholder="For example: three quick vegetarian dinners for one person." rows="5" th:text="${mealRequest}"></textarea>
            <p aria-live="polite" class="validation-message" th:if="${validationMessage}" th:text="${validationMessage}"></p>
            <button type="submit">Get meal ideas</button>
        </form>
    </section>
    <section aria-labelledby="products-heading" class="products-panel">
        <h2 id="products-heading">Products</h2>
        <div class="product-grid">
            <article class="product-card" data-testid="product-card" th:each="product : ${products}">
                <div aria-hidden="true" class="product-image-placeholder"></div>
                <h3 th:text="${product.name}">Product name</h3>
                <p th:text="${product.packageDetail}">Package detail</p>
                <p class="product-price" th:text="${product.formattedPrice}">0,00 €</p>
            </article>
        </div>
    </section>
</main>
</body>
</html>
