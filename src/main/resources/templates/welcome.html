<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Duke Greens</title>
</head>
<body>
<main layout:fragment="content">
    <section aria-labelledby="welcome-heading" class="welcome-panel">
        <p class="eyebrow">Next generation green supermarket</p>
        <h1 id="welcome-heading">Duke Greens</h1>
        <p>Tell us what you would like to cook, and we will help plan your meals and groceries.</p>
        <section aria-live="polite" class="information-message" role="status" th:if="${outOfScopeMessage}">
            <h2>Meal ideas only</h2>
            <p th:text="${outOfScopeMessage}"></p>
        </section>
        <section aria-live="polite" class="information-message" role="status" th:if="${informationMessage}">
            <h2>Meal request unavailable</h2>
            <p th:text="${informationMessage}"></p>
        </section>
        <form id="meal-request-form" method="post" th:action="@{/demo/meal-request}">
            <label for="meal-request">Describe the meals you want</label>
            <textarea id="meal-request" maxlength="300" name="mealRequest" placeholder="For example: three quick vegetarian dinners for one person." rows="5" th:text="${mealRequest}"></textarea>
            <p aria-live="polite" class="validation-message" th:if="${validationMessage}" th:text="${validationMessage}"></p>
        </form>
        <div class="meal-request-actions">
            <form method="post" th:action="@{/demo/logout}">
                <button class="secondary-action" type="submit">Log out</button>
            </form>
            <button class="meal-request-submit" form="meal-request-form" type="submit">Get meal ideas</button>
        </div>
    </section>
    <section aria-labelledby="products-heading" class="products-panel">
        <h2 id="products-heading">Products</h2>
        <div class="product-grid">
            <article class="product-card" data-testid="product-card" th:each="product : ${products}">
                <img class="product-image" th:alt="${product.name}" th:if="${product.imageFilename}" th:src="@{/images/300/{filename}(filename=${product.imageFilename})}">
                <div aria-hidden="true" class="product-image-placeholder" th:unless="${product.imageFilename}"></div>
                <h3 th:text="${product.name}">Product name</h3>
                <p th:text="${product.packageDetail}">Package detail</p>
                <p class="product-price" th:text="${product.formattedPrice}">0,00 €</p>
            </article>
        </div>
    </section>
</main>
</body>
</html>
